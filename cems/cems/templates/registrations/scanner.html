{% load static %}{# django-html #}
<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Agora | Attendance Scanner</title>
 <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/html5-qrcode"></script>
 <script>
 tailwind.config = {
 theme: {
 extend: {
 fontFamily: {
 sans: ['"DM Sans"', 'sans-serif'],
 serif: ['"Instrument Serif"', 'serif'],
 mono: ['"JetBrains Mono"', 'monospace']
 },
 colors: {
 brand: { DEFAULT: '#2563eb', dark: '#1d4ed8', light: '#eff6ff' },
 ink: { 950: '#010409', 900: '#0d1117', 800: '#161b22', 700: '#21262d', 600: '#30363d', 500: '#484f58', 400: '#6e7681', 300: '#8b949e', 200: '#c9d1d9', 100: '#e6edf3', 50: '#f6f8fa' }
 }
 }
 }
 }
 </script>
 <style>
 body { background-color: #f8fafc; }
 .scanner-view { position: relative; overflow: hidden; border-radius: 3rem; background: #ffffff; border: 1px solid #e2e8f0; }
 .scanner-overlay { position: absolute; inset: 0; pointer-events: none; border: 4px solid rgba(0,0,0,0.02); border-radius: 3rem; z-index: 10; }
 .scan-region-highlight { border: 2px solid #2563eb !important; border-radius: 2rem !important; box-shadow: 0 0 0 4000px rgba(255,255,255,0.7) !important; }
 .scanning-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #2563eb; z-index: 15; animation: scanMove 2.5s infinite ease-in-out; }
 @keyframes scanMove { 0%, 100% { top: 15%; opacity: 0; } 50% { top: 85%; opacity: 1; } }
 .glass-dark { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
 </style>
</head>

<body class="font-sans antialiased text-slate-900 min-h-screen flex flex-col">

 <header class="p-8 lg:p-12 flex items-center justify-between">
 <div class="flex items-center gap-4">
 <div class="w-12 h-12 rounded-2xl bg-brand flex items-center justify-center font-black text-2xl shadow-xl text-white">C</div>
 <div>
 <h1 class="text-3xl font-bold leading-none">Attendance Scanner</h1>
 <p class="text-[9px] font-black uppercase text-slate-400 tracking-[0.4em] mt-1">Event Management</p>
 </div>
 </div>
 <a href="{% url 'staff_dashboard' %}" class="px-8 py-3 bg-white rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 hover:bg-slate-50 transition-all border border-slate-200">Return to Dashboard</a>
 </header>

 <main class="flex-1 flex flex-col items-center justify-center p-6 gap-12">
 
 <!-- SCANNER CONTAINER -->
 <div class="w-full max-w-lg aspect-square scanner-view relative shadow-2xl">
 <div id="reader" class="w-full h-full overflow-hidden"></div>
 <div class="scanner-overlay"></div>
 <div class="scanning-line" id="scan-line"></div>
 
 <!-- Instructions Overlay -->
 <div id="scanner-instructions" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/95 backdrop-blur-sm p-12 text-center transition-all duration-700 border border-slate-100 rounded-3xl">
 <div class="w-24 h-24 rounded-[2.5rem] bg-brand/10 text-brand flex items-center justify-center text-5xl mb-10 shadow-xl"></div>
 <h2 class="text-4xl font-bold mb-4">Enable Camera</h2>
 <p class="text-sm text-slate-500 leading-relaxed mb-10 font-medium">Please allow camera access to scan student registration QR codes.</p>
 <button onclick="startScanning()" class="px-10 py-5 bg-brand text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-2xl shadow-xl hover:brightness-110 transition-all">Start Scanner</button>
 </div>
 </div>

 <!-- STATUS PANEL -->
 <div class="w-full max-w-md bg-white rounded-[3rem] p-10 text-center relative overflow-hidden shadow-sm border border-slate-100 group">
 <div class="absolute top-0 left-0 w-full h-1 bg-slate-100 group-hover:bg-brand transition-all"></div>
 <div id="status-icon" class="w-16 h-16 rounded-[1.5rem] bg-slate-50 border border-slate-100 mx-auto flex items-center justify-center mb-6 text-3xl shadow-sm text-slate-400"></div>
 <h3 id="status-text" class="text-3xl font-bold mb-2 text-slate-900">Awaiting Scan</h3>
 <p id="status-sub" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Position QR code within frame</p>
 </div>

 </main>

 <footer class="p-12 text-center">
 <p class="text-[9px] font-black uppercase tracking-widest text-slate-300">Agora Institutional Portal</p>
 </footer>

 <script>
 let html5QrCode = null;

 function startScanning() {
 document.getElementById('scanner-instructions').classList.add('opacity-0', 'pointer-events-none', 'scale-110');
 document.getElementById('status-text').textContent = 'Camera Active';
 document.getElementById('status-icon').innerHTML = '';
 document.getElementById('status-icon').classList.add('', 'text-brand');

 html5QrCode = new Html5Qrcode("reader");
 const config = { fps: 20, qrbox: { width: 300, height: 300 } };

 html5QrCode.start(
 { facingMode: "environment" }, 
 config, 
 onScanSuccess,
 onScanFailure
 ).catch(err => {
 console.error(err);
 document.getElementById('status-text').textContent = 'Camera Error';
 document.getElementById('status-sub').textContent = err;
 document.getElementById('scanner-instructions').classList.remove('opacity-0', 'pointer-events-none', 'scale-110');
 });
 }

 function onScanSuccess(decodedText, decodedResult) {
 if (html5QrCode) {
 html5QrCode.stop().then(() => {
 document.getElementById('status-icon').innerHTML = '';
 document.getElementById('status-text').textContent = 'QR Code Detected';
 document.getElementById('status-sub').textContent = 'Processing registration...';
 
 if (decodedText.includes('/registrations/verify/')) {
 window.location.href = decodedText;
 } else {
 alert("Invalid QR Code: Not a recognized Agora ticket.");
 startScanning();
 }
 });
 }
 }

 function onScanFailure(error) {
 // Background scanning - ignore
 }
 </script>

</body>
</html>
