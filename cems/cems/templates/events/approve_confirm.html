{% extends 'base.html' %}
{% block title %}Approve Event{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-16">
  <div class="bg-white rounded-2xl border border-ink-100 shadow-lg p-8 text-center">
    <div class="w-16 h-16 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center text-3xl mx-auto mb-5">✅</div>
    <h1 class="font-serif italic text-3xl font-bold text-ink-900 mb-2">Approve Event?</h1>
    <p class="text-ink-500 mb-2">You are about to approve:</p>
    <p class="font-bold text-ink-900 text-lg mb-6">{{ event.title }}</p>
    <p class="text-sm text-ink-400 mb-8">Approving will allow the event to be published. It will notify the creator.</p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3 justify-center">
        <a href="{% url 'event_detail' event.pk %}" class="px-6 py-3 text-sm font-semibold text-ink-600 bg-ink-50 rounded-xl border border-ink-200 hover:bg-ink-100 transition-colors">Cancel</a>
        <button type="submit" class="px-8 py-3 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow transition-colors">Yes, Approve</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
