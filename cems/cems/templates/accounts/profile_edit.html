{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
        <div class="px-10 py-8 bg-indigo-600 text-white">
            <h2 class="text-3xl font-black">Edit Profile</h2>
            <p class="text-indigo-100 mt-1">Update your personal information</p>
        </div>
        
        <form method="post" action="{% url 'profile_update' %}" class="p-10 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">First Name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">Last Name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">Email Address</label>
                <input type="email" name="email" value="{{ user.email }}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">Department</label>
                <input type="text" name="department" value="{{ user.profile.department }}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">Phone</label>
                <input type="text" name="phone" value="{{ user.profile.phone }}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-[0.65rem] font-black uppercase tracking-widest text-slate-400">Biography</label>
                <textarea name="bio" rows="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">{{ user.profile.bio }}</textarea>
            </div>

            <div class="pt-6 flex gap-4">
                <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all">Save Changes</button>
                <a href="{% url 'profile' %}" class="px-8 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
